name: CI/CD Pokédex

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint ESLint
        run: npm run lint || true

      - name: Tests unitaires
        run: npm run test -- --run

      - name: Tests e2e Playwright
        run: |
          npx playwright install --with-deps chromium
          npx playwright test
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
          VITE_GITHUB_REPO: Igbes-07/pokedex-s6

      - name: Protéger les fichiers .env
        run: |
          cat > dist/.htaccess << EOF
          <Files ".env*">
            Order allow,deny
            Deny from all
          </Files>
          EOF

      - name: Afficher le déployeur
        run: echo "Déployé par ${{ github.actor }} le $(date)"

      - name: Déployer sur AlwaysData via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /home/hamedwassila/www/pokedex-s6/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}
      - name: Déployer dossier admin (PHP)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr
          path: admin/
          remote_path: /home/hamedwassila/www/pokedex-s6/admin/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Créer dossier jaquettes sur le serveur
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: mkdir -p /home/hamedwassila/www/pokedex-s6/jaquettes